name: Build Binaries

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-x64
            runner: macos-15-intel
            archive_name: opsh-darwin-x64.tar.gz
            bundle_dir: build/bin/darwin-x64
          - target: linux-x64
            runner: ubuntu-24.04
            archive_name: opsh-linux-x64.tar.gz
            bundle_dir: build/bin/linux-x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            archive_name: opsh-linux-arm64.tar.gz
            bundle_dir: build/bin/linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary bundle
        run: bun run build:binary

      - name: Package bundle
        run: tar -czf "${{ matrix.archive_name }}" -C "${{ matrix.bundle_dir }}" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.archive_name }}" --clobber
