name: Build Binaries

on:
  push:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  create-release:
    name: Create release from version bump
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Detect version bump and create release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_version="$(bun -e 'import pkg from "./package.json"; console.log(pkg.version)')"
          current_tag="v${current_version}"

          latest_release_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null || true)"
          latest_release_version="${latest_release_tag#v}"

          echo "version=${current_version}" >>"$GITHUB_OUTPUT"
          echo "tag=${current_tag}" >>"$GITHUB_OUTPUT"

          if [ -z "$current_version" ] || [ "$current_version" = "$latest_release_version" ]; then
            echo "released=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse "$current_tag" >/dev/null 2>&1 || gh release view "$current_tag" >/dev/null 2>&1; then
            echo "released=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          gh release create "$current_tag" \
            --target "$GITHUB_SHA" \
            --title "$current_tag" \
            --notes "Release ${current_tag}"

          echo "released=true" >>"$GITHUB_OUTPUT"

  build-from-push-release:
    name: Build ${{ matrix.target }} for created release
    needs: create-release
    if: github.event_name == 'push' && needs.create-release.outputs.released == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
            archive_name: opsh-macos-x64.tar.gz
            bundle_dir: build/bin/darwin-x64
          - target: macos-arm64
            runner: macos-15
            archive_name: opsh-macos-arm64.tar.gz
            bundle_dir: build/bin/darwin-arm64
          - target: linux-x64
            runner: ubuntu-24.04
            archive_name: opsh-linux-x64.tar.gz
            bundle_dir: build/bin/linux-x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            archive_name: opsh-linux-arm64.tar.gz
            bundle_dir: build/bin/linux-arm64

    steps:
      - name: Check out repository at release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.create-release.outputs.tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary bundle
        run: bun run build:binary

      - name: Package bundle
        run: tar -czf "${{ matrix.archive_name }}" -C "${{ matrix.bundle_dir }}" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: push-${{ matrix.target }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.create-release.outputs.tag }}" "${{ matrix.archive_name }}" --clobber

  build-from-release:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
            archive_name: opsh-macos-x64.tar.gz
            bundle_dir: build/bin/darwin-x64
          - target: macos-arm64
            runner: macos-15
            archive_name: opsh-macos-arm64.tar.gz
            bundle_dir: build/bin/darwin-arm64
          - target: linux-x64
            runner: ubuntu-24.04
            archive_name: opsh-linux-x64.tar.gz
            bundle_dir: build/bin/linux-x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            archive_name: opsh-linux-arm64.tar.gz
            bundle_dir: build/bin/linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary bundle
        run: bun run build:binary

      - name: Package bundle
        run: tar -czf "${{ matrix.archive_name }}" -C "${{ matrix.bundle_dir }}" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.archive_name }}" --clobber
